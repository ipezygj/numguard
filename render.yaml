# One-click deploy on Render (render.com): New + > Blueprint > point at this repo.
services:
  - type: web
    name: numguard
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      # Receiving wallet (public EVM address). Same address works on testnet and mainnet.
      - key: NUMGUARD_PAYTO
        value: "0x75c5487C44E0EA83E5F2f692BF301500a40B836f"

      # numguard's verifier is facilitator-AGNOSTIC — any x402 facilitator exposing /verify + /settle works.
      # START ON TESTNET (free test-USDC): https://x402.org/facilitator   (network: base-sepolia)
      # MAINNET, NON-COINBASE options:
      #   - self-host  x402-rs  (open-source Rust, no third party — most sovereign) -> your own URL
      #   - thirdweb   facilitator (hosted)     - needs a thirdweb key -> NUMGUARD_FACILITATOR_AUTH
      #   - PayAI      facilitator (hosted, Base/Solana/Polygon)
      - key: NUMGUARD_FACILITATOR_URL
        sync: false        # set in the dashboard (testnet URL first)
      - key: NUMGUARD_NETWORK
        value: base-sepolia   # test with test-USDC first; change to 'base' for real payments
      - key: NUMGUARD_FACILITATOR_AUTH
        sync: false        # only if your chosen facilitator needs an auth header (e.g. thirdweb key)
