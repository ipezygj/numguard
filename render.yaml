# Render Blueprint: numguard (public API) + your own x402-rs facilitator (settles payments to your wallet).
services:
  - type: web
    name: numguard
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NUMGUARD_PAYTO
        value: "0x75c5487C44E0EA83E5F2f692BF301500a40B836f"   # your receiving wallet (public)
      - key: NUMGUARD_NETWORK
        value: base-sepolia        # testnet first; change to 'base' for real money
      - key: NUMGUARD_FACILITATOR_URL
        fromService:               # auto-wired to the facilitator service's URL
          type: web
          name: x402-facilitator
          property: url
      - key: NUMGUARD_FACILITATOR_AUTH
        sync: false                # not needed for your own facilitator

  # Your own facilitator. Needs FACILITATOR_PRIVATE_KEY = a DEDICATED gas wallet (small Base-Sepolia ETH).
  - type: web
    name: x402-facilitator
    runtime: docker
    dockerfilePath: ./facilitator/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: FACILITATOR_PRIVATE_KEY
        sync: false                # set in the dashboard — NEVER commit a private key
      - key: HOST
        value: "0.0.0.0"
