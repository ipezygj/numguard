# Render Blueprint: numguard — one public service that settles x402 payments on-chain itself.
# No separate facilitator: numguard verifies the agent's signed USDC authorization and submits it to the USDC
# contract, paying gas from NUMGUARD_GAS_KEY. USDC settles straight to NUMGUARD_PAYTO.
services:
  - type: web
    name: numguard
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PYTHONUTF8
        value: "1"                 # force UTF-8 mode: a slim container's C locale otherwise mojibake's
                                   # non-ASCII (e.g. a verdict's em-dash), which would break a receipt digest
      - key: NUMGUARD_PAYTO
        value: "0x75c5487C44E0EA83E5F2f692BF301500a40B836f"   # your receiving wallet (public)
      - key: NUMGUARD_NETWORK
        value: base                # Base mainnet — real USDC
      - key: NUMGUARD_GAS_KEY
        sync: false                # DEDICATED gas wallet private key (small Base ETH) — set in the dashboard,
                                   # NEVER commit. This is the same wallet you funded for gas; numguard uses it
                                   # to broadcast settlements. Not your receiving wallet.
      - key: NUMGUARD_RPC
        sync: false                # optional: a private Base RPC (Alchemy/Ankr) if the public one rate-limits
      - key: NUMGUARD_TURSO_URL
        sync: false                # durable ledger: a free Turso/libSQL DB URL (libsql://…) so the public
                                   # verdict record SURVIVES redeploys (no re-seeding). Unset => in-memory file.
      - key: NUMGUARD_TURSO_TOKEN
        sync: false                # the Turso DB auth token (from `turso db tokens create`)
      - key: NUMGUARD_ADMIN_KEY
        generateValue: true        # operator seed auth: send it as the X-ADMIN-KEY header to POST /admin/seed
                                   # to publish curated notary verdicts free (no x402). Read its value once
                                   # from the Render dashboard. Unset => seeding disabled (fail closed).
      - key: NUMGUARD_ISSUER_KEY
        generateValue: true        # Render generates a high-entropy secret ONCE and keeps it across deploys;
                                   # numguard derives a STABLE Ed25519 issuer identity from it (see
                                   # identity._seed_from_env). The signing key never leaves Render — no file to
                                   # open, nothing to paste. After first deploy, read the public key from /pubkey.
